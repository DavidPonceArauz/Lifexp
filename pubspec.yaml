name: lifexp
description: LifeXP - Level Up Your Life
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Supabase
  supabase_flutter: ^2.8.4

  # Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Deep links para Supabase Auth callbacks
  app_links: ^6.3.2

  # Stats dentro de perfil
  fl_chart: ^0.68.0

  # Monitoreo de errores sentry
  sentry_flutter: ^8.3.0

  # Monitoreo de actividad Usuario
  posthog_flutter: ^5.0.0

  # Editor de texto mas complejo
  flutter_quill: ^11.5.0

  # Para subir imagenes
  image_picker: ^1.1.2

  # Enlaces externos y mailto
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Riverpod code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/icon.png
    - assets/images/acorn.png
    - assets/images/leaf_brown.png
    - assets/images/leaf_orange.png
    - assets/images/leaf_yellow.png
    - assets/images/tree_large.png
    - assets/images/tree_medium.png
    - assets/images/tree_small.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F4EFE6"
  adaptive_icon_foreground: "assets/icon/icon.png"
